site_name: ClaimSync Documentation
site_description: Documentation for ClaimSync
site_url: https://claimsync.github.io/
repo_url: https://github.com/claimsync/claimsync.github.io
repo_name: claimsync/claimsync.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Onboarding: getting-started/onboarding.md
      - Local Setup: getting-started/local-setup.md
  - Architecture:
      - architecture/index.md
      - Overview: architecture/overview.md
      - Decisions (ADRs): architecture/decisions.md
  - Guides:
      - guides/index.md
      - Contributing: guides/contributing.md
      - Documentation Style: guides/documentation-style.md
  - API Reference:
      - api/index.md
  - Operations:
      - operations/index.md
      - Deployment: operations/deployment.md
      - Runbooks: operations/runbooks.md
      - Incident Response: operations/incident-response.md
  - Projects:
      - projects/index.md
  - Reference:
      - Glossary: reference/glossary.md
